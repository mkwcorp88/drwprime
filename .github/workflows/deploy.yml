name: Deploy to VPS (Coolify)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DEPLOY_IMAGE: ghcr.io/mkwcorp88/drwprime
  LOCAL_IMAGE: 127.0.0.1:5555/drwprime
  COOLIFY_API_URL: http://127.0.0.1:8000/api/v1
  COOLIFY_APP_UUID: k79t06olv0zwlwpdy3n4gpdm
  REGISTRY_HOST_PORT: 127.0.0.1:5555

jobs:
  build:
    name: Build & push
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.DEPLOY_IMAGE }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DEPLOY_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DEPLOY_IMAGE }}:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_live_Y2xlcmsuZHJ3cHJpbWUuY29tJA
          secrets: |
            database_url=${{ secrets.DATABASE_URL }}
            database_uri=${{ secrets.DATABASE_URI }}
            payload_secret=${{ secrets.PAYLOAD_SECRET }}
            clerk_secret_key=${{ secrets.CLERK_SECRET_KEY }}

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build
    env:
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Mirror to local registry
        run: |
          printf '%s' "${{ github.token }}" | docker login "$REGISTRY" --username "${{ github.actor }}" --password-stdin
          docker pull "$DEPLOY_IMAGE:$IMAGE_TAG"
          # Push via host port (127.0.0.1:5555), Coolify pulls via Docker network (drw-registry:5000)
          docker tag "$DEPLOY_IMAGE:$IMAGE_TAG" "$REGISTRY_HOST_PORT/drwprime:latest"
          docker tag "$DEPLOY_IMAGE:$IMAGE_TAG" "$REGISTRY_HOST_PORT/drwprime:$IMAGE_TAG"
          docker push "$REGISTRY_HOST_PORT/drwprime:latest"
          docker push "$REGISTRY_HOST_PORT/drwprime:$IMAGE_TAG"

      - name: Update Coolify & deploy
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --request PATCH \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"docker_registry_image_name\":\"$LOCAL_IMAGE\",\"docker_registry_image_tag\":\"$IMAGE_TAG\"}" \
            "$COOLIFY_API_URL/applications/$COOLIFY_APP_UUID"

          curl --fail-with-body --silent --show-error \
            --request GET \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_API_URL/deploy?uuid=$COOLIFY_APP_UUID&force=true"

      - name: Wait for healthy container
        run: |
          last_cid=""
          for i in $(seq 1 18); do
            cid="$(docker ps -a --latest --filter "label=coolify.name=$COOLIFY_APP_UUID" --format '{{.ID}}')"
            if [ -n "$cid" ]; then
              last_cid="$cid"
              tag="$(docker inspect --format '{{.Config.Image}}' "$cid")"
              running="$(docker inspect --format '{{.State.Running}}' "$cid")"
              if [ "$tag" = "$LOCAL_IMAGE:$IMAGE_TAG" ]; then
                if [ "$running" != "true" ]; then
                  docker logs --tail 200 "$cid" || true
                  exit 1
                fi
                if docker exec "$cid" node -e "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
                  exit 0
                fi
              fi
            fi
            sleep 10
          done
          if [ -n "$last_cid" ]; then
            docker logs --tail 200 "$last_cid" || true
          fi
          exit 1
