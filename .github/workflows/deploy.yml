name: Deploy to VPS (Coolify)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Coolify deploys an exact private image that this runner pulls first.
  DEPLOY_IMAGE: ghcr.io/mkwcorp88/drwprime
  COOLIFY_API_URL: http://127.0.0.1:8000/api/v1
  COOLIFY_APP_UUID: k79t06olv0zwlwpdy3n4gpdm

jobs:
  build:
    name: Build & push image to GHCR
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEPLOY_IMAGE }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      # Build secrets are never persisted in the image or registry cache.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DEPLOY_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DEPLOY_IMAGE }}:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_live_Y2xlcmsuZHJ3cHJpbWUuY29tJA
          secrets: |
            database_url=${{ secrets.DATABASE_URL }}
            database_uri=${{ secrets.DATABASE_URI }}
            payload_secret=${{ secrets.PAYLOAD_SECRET }}
            clerk_secret_key=${{ secrets.CLERK_SECRET_KEY }}

  deploy:
    name: Deploy exact image with Coolify
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: read
    env:
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Login to GHCR for the rollout
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the immutable image onto the Coolify host
        run: docker pull "$DEPLOY_IMAGE:$IMAGE_TAG"

      - name: Point Coolify to the immutable image tag
        run: |
          curl --fail-with-body --silent --show-error \
            --request PATCH \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"docker_registry_image_name\":\"$DEPLOY_IMAGE\",\"docker_registry_image_tag\":\"$IMAGE_TAG\",\"health_check_enabled\":true,\"health_check_path\":\"/\",\"health_check_port\":\"3000\",\"health_check_method\":\"GET\",\"health_check_return_code\":200,\"health_check_timeout\":10,\"health_check_retries\":12,\"health_check_start_period\":30}" \
            "$COOLIFY_API_URL/applications/$COOLIFY_APP_UUID"

      - name: Tell Coolify to pull and redeploy
        run: |
          curl --fail-with-body --silent --show-error \
            --request GET \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_API_URL/deploy?uuid=$COOLIFY_APP_UUID&force=true"

      - name: Verify the active container revision
        run: |
          for attempt in $(seq 1 36); do
            container_id="$(docker ps --latest --filter "label=coolify.name=$COOLIFY_APP_UUID" --format '{{.ID}}')"
            if [ -n "$container_id" ]; then
              image="$(docker inspect --format '{{.Config.Image}}' "$container_id")"
              revision="$(docker inspect --format '{{ index .Config.Labels \"org.opencontainers.image.revision\" }}' "$container_id")"
              running="$(docker inspect --format '{{.State.Running}}' "$container_id")"
              if [ "$image" = "$DEPLOY_IMAGE:$IMAGE_TAG" ] && [ "$revision" = "$GITHUB_SHA" ] && [ "$running" = "true" ]; then
                docker exec "$container_id" node -e "fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
                exit $?
              fi
            fi
            sleep 10
          done
          exit 1
