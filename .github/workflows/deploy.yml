name: Deploy to VPS (Coolify)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  COOLIFY_API_URL: http://127.0.0.1:8000/api/v1
  COOLIFY_APP_UUID: k79t06olv0zwlwpdy3n4gpdm

jobs:
  deploy:
    name: Deploy via Coolify
    runs-on: self-hosted
    env:
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - name: Ensure Coolify uses dockerfile mode (builds from repo)
        run: |
          curl --fail-with-body --silent --show-error \
            --request PATCH \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"build_pack":"dockerfile","docker_registry_image_name":null,"docker_registry_image_tag":null}' \
            "$COOLIFY_API_URL/applications/$COOLIFY_APP_UUID"

      - name: Deploy with automatic rollback
        run: |
          set -Eeuo pipefail

          application="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_API_URL/applications/$COOLIFY_APP_UUID")"
          previous_build_pack="$(echo "$application" | jq -r '.build_pack')"

          rollback() {
            trap - ERR
            curl --fail-with-body --silent --show-error \
              --request PATCH \
              --header "Authorization: Bearer $COOLIFY_TOKEN" \
              --header "Content-Type: application/json" \
              --data "{\"build_pack\":\"$previous_build_pack\"}" \
              "$COOLIFY_API_URL/applications/$COOLIFY_APP_UUID" || true
            curl --fail-with-body --silent --show-error \
              --request GET \
              --header "Authorization: Bearer $COOLIFY_TOKEN" \
              "$COOLIFY_API_URL/deploy?uuid=$COOLIFY_APP_UUID&force=true" || true
            for attempt in $(seq 1 36); do
              container_id="$(docker ps --latest --filter "label=coolify.name=$COOLIFY_APP_UUID" --format '{{.ID}}')"
              running="$(docker inspect --format '{{.State.Running}}' "$container_id" 2>/dev/null || echo false)"
              if [ "$running" = "true" ]; then return 0; fi
              sleep 10
            done
          }
          trap rollback ERR

          deployment="$(curl --fail-with-body --silent --show-error \
            --request GET \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_API_URL/deploy?uuid=$COOLIFY_APP_UUID&force=true")"
          deployment_uuid="$(echo "$deployment" | jq -r '.deployments[0].deployment_uuid')"
          test -n "$deployment_uuid"
          test "$deployment_uuid" != "null"

          for attempt in $(seq 1 72); do
            status="$(curl --silent --show-error \
              --header "Authorization: Bearer $COOLIFY_TOKEN" \
              "$COOLIFY_API_URL/deployments/$deployment_uuid" | jq -r '.status')"
            test "$status" != "failed"
            if [ "$status" = "finished" ]; then
              container_id="$(docker ps --latest --filter "label=coolify.name=$COOLIFY_APP_UUID" --format '{{.ID}}')"
              running="$(docker inspect --format '{{.State.Running}}' "$container_id")"
              if [ "$running" = "true" ]; then
                docker exec "$container_id" node -e "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
                exit $?
              fi
              exit 1
            fi
            sleep 10
          done
          exit 1
