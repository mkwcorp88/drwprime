name: Deploy to VPS (Coolify)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image owner must be lowercase for GHCR.
  DEPLOY_IMAGE: ghcr.io/mkwcorp/drwprime

jobs:
  build:
    name: Build & push image to GHCR
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DEPLOY_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      # Builds run on GitHub-hosted runners (the VPS only pulls the finished
      # image). DB/Payload secrets are passed as BuildKit secrets so they never
      # land in an image layer or the registry cache. Layer cache is persisted
      # in the registry for incremental builds.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DEPLOY_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DEPLOY_IMAGE }}:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_live_Y2xlcmsuZHJ3cHJpbWUuY29tJA
          secrets: |
            database_url=${{ secrets.DATABASE_URL }}
            database_uri=${{ secrets.DATABASE_URI }}
            payload_secret=${{ secrets.PAYLOAD_SECRET }}
            clerk_secret_key=${{ secrets.CLERK_SECRET_KEY }}

  deploy:
    name: Trigger Coolify redeploy
    runs-on: self-hosted
    needs: build
    steps:
      - name: Tell Coolify to pull & redeploy
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "http://213.190.4.159:8000/api/v1/deploy?uuid=k79t06olv0zwlwpdy3n4gpdm&force=false" \
            && echo "Coolify deploy triggered."
